extends:
  - spectral:oas

rules:
  camara-info-title:
    description: CAMARA API info.title SHOULD end with "API".
    given: $.info
    severity: warn
    then:
      field: title
      function: pattern
      functionOptions:
        match: ".*API$"

  camara-info-version:
    description: CAMARA APIs MUST declare a semantic version.
    given: $.info
    severity: error
    then:
      field: version
      function: pattern
      functionOptions:
        match: "^\\d+\\.\\d+\\.\\d+(-.*)?$"

  camara-server-basepath-versioned:
    description: CAMARA API server URL should include a /vN version segment.
    given: $.servers[*]
    severity: warn
    then:
      field: url
      function: pattern
      functionOptions:
        match: ".*/v\\d+.*"

  camara-security-oauth2-required:
    description: CAMARA APIs must declare OAuth2 / OpenID Connect security (CIBA flow expected).
    given: $.components.securitySchemes
    severity: error
    then:
      function: truthy

  camara-error-response-standard:
    description: CAMARA operations should declare a standard Error response.
    given: $.paths[*][*].responses
    severity: warn
    then:
      field: "400"
      function: truthy

  camara-xcorrelator-header:
    description: CAMARA operations should accept an x-correlator header for tracing.
    given: $.paths[*][get,post,put,delete,patch].parameters
    severity: info
    then:
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            properties:
              name:
                const: x-correlator

  camara-device-identifier-schema:
    description: CAMARA APIs that accept a device identifier should reference the common Device schema.
    given: $.components.schemas.Device
    severity: info
    then:
      function: truthy

  camara-tag-descriptions:
    description: Each CAMARA tag should carry a description.
    given: $.tags[*]
    severity: warn
    then:
      field: description
      function: truthy
